<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="feed" id="feed"></div>

    <script>
        // СЮДА ВСТАВЛЯЙ СВОИ ССЫЛКИ
        const imageUrls = [
            "https://example.com/photo1.jpg",
            "https://example.com/another-link.png",
            "https://mysite.ru/image404.jpg",
            // ... добавь все остальные ссылки через запятую в кавычках
        ];

        const container = document.getElementById('feed');

        // Скрипт сам создаст картинки и расставит их по порядку из списка выше
        imageUrls.forEach((url, index) => {
            const img = document.createElement('img');
            img.src = url;
            img.alt = `Слайд ${index + 1}`;
            img.loading = "lazy"; // Чтобы картинки подгружались постепенно при скролле
            container.appendChild(img);
        });
    </script>

</body>
</html>
